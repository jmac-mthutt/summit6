<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Summit 6 Crowd Control Simulator</title>

<style>
  :root{
    --green:#33cc55;
    --amber:#e6ae37;
    --red:#d84848;
  }
  body{
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
    margin:0;
    padding:0;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  #stats{
    width:90%;
    max-width:500px;
    background:#202020;
    border:2px solid #555;
    margin-top:6px;
    padding:6px;
    border-radius:8px;
    text-align:center;
    font-size:18px;
  }
  #gph{
    font-weight:bold;
  }
  #timer{
    font-weight:bold;
  }
  #goBtn, #restartBtn{
    width:90%;
    max-width:500px;
    margin-top:10px;
    padding:12px;
    font-size:18px;
    background:#555;
    color:#fff;
    border:1px solid #888;
    border-radius:6px;
    cursor:pointer;
  }
  #goBtn:disabled{
    opacity:0.4;
    cursor:not-allowed;
  }
  #restartBtn{
    display:none;
  }
  #canvasContainer{
    width:95%;
    display:flex;
    justify-content:center;
    align-items:center;
  }
  canvas{
    width:100%;
    max-width:500px;
    height:auto;
    background:#222;
    border:2px solid #fff;
    touch-action:none;
  }
  #timeUp{
    position:fixed;
    top:40%;
    width:100%;
    text-align:center;
    font-size:30px;
    color:#fff;
    text-shadow:0 0 10px #000;
    display:none;
  }
</style>

</head>
<body>

<h2>Summit 6 Crowd Control Simulator</h2>

<div id="stats">
  Guests/hour: <span id="gph">0</span><br>
  Timer: <span id="timer">03:00</span><br>
  Score: <span id="score">0 out of 25</span>
</div>

<div id="canvasContainer">
  <canvas id="gameCanvas" width="500" height="700"></canvas>
</div>

<div id="timeUp">⏰ Time Up!</div>

<button id="goBtn" disabled>GO</button>
<button id="restartBtn">Restart Game</button>

<script>
// ======================================================================
//  GLOBAL GAME CONSTANTS
// ======================================================================
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');

const HEIGHT=canvas.height;
const WIDTH=canvas.width;
const GRID_UNIT=40;

const ROW_HEIGHT=GRID_UNIT;
const ROW_CENTER = GRID_UNIT/2;

const COL_SIZES=[1,3,3,3];    // Column widths in grid cells
const COL_X=[0,50,200,350];   // Pixel x-offsets per column
// Reveal zone — bottom 3 rows ONLY (fixed)
const REVEAL_ZONE_TOP = HEIGHT - 3 * GRID_UNIT;
const TOKEN_COLOR='#41a3ff';
const BASE_REVEAL_TIME=1500;  // ms for 6-token dwell reveal
const BOTTOM_SELECT_ZONE = HEIGHT - 3*GRID_UNIT;

let tokensPerSecond=0.5;
let fallInterval=1000/tokensPerSecond;

let groups=[];
let selected=[];
let columnHeights=[0,0,0,0];

let rowsRemoved=[0,0,0,0];
let tokensRemovedTotal=0;

let startTime=performance.now();
let gameOver=false;

// ======================================================================
//  UI ELEMENTS
// ======================================================================
const gphElem=document.getElementById('gph');
const timerElem=document.getElementById('timer');
const scoreElem=document.getElementById('score');
const goBtn=document.getElementById('goBtn');
const restartBtn=document.getElementById('restartBtn');
const timeUpElem=document.getElementById('timeUp');

const GAME_LIMIT=180000; // 3 minutes

// ======================================================================
//  INPUT HANDLING
// ======================================================================
let mouseX=-1000, mouseY=-1000;

function processPointer(e){
  const r=canvas.getBoundingClientRect();
  if(e.touches){
    mouseX = e.touches[0].clientX - r.left;
    mouseY = e.touches[0].clientY - r.top;
  }else{
    mouseX = e.clientX - r.left;
    mouseY = e.clientY - r.top;
  }
}

canvas.addEventListener('mousemove',processPointer);
canvas.addEventListener('touchmove',processPointer);
canvas.addEventListener('mouseleave',()=>{mouseX=-1000;mouseY=-1000;});
canvas.addEventListener('touchend',()=>{mouseX=-1000;mouseY=-1000;});

// ======================================================================
//  GROUP CLASS
// ======================================================================
class Group{
  constructor(colIndex,tokenCount,yPos){
    this.colIndex=colIndex;

    // Column 1 (index 0) MUST be 1-token only
    if(colIndex===0) tokenCount = 1;

    this.tokenCount=tokenCount;

    const cw = COL_SIZES[colIndex];
    this.rows = Math.ceil(tokenCount / cw);

    this.x = COL_X[colIndex];
    this.y = (yPos !== undefined ? yPos : -this.rows*GRID_UNIT);

    this.desiredY = this.y;
    this.landed=false;
    this.fallTimer=0;

    this.revealProgress=0;
    this.revealed=false;
    // Generate stable random seeds for each token's face
    this.faceSeeds=[];
    for(let i=0;i<this.tokenCount;i++) this.faceSeeds.push(Math.random());
  }

  get bottom(){
    return this.y + this.rows*GRID_UNIT;
  }

  update(dt){
    if(!this.landed){
      this.fallTimer+=dt;
      if(this.fallTimer>=fallInterval){
        this.fallTimer=0;

        const projected = this.y + GRID_UNIT;
        const spaceBelow = HEIGHT - columnHeights[this.colIndex]*GRID_UNIT;

        if(projected + this.rows*GRID_UNIT <= spaceBelow){
          this.y = projected;
        }else{
          this.y = HEIGHT - (columnHeights[this.colIndex]+this.rows)*GRID_UNIT;
          columnHeights[this.colIndex]+=this.rows;
          this.landed=true;
          this.desiredY=this.y;
        }
      }
    }else{
      const diff=this.desiredY-this.y;
      if(Math.abs(diff)>1) this.y+=diff*0.2;
      else this.y=this.desiredY;
    }

    if(!this.revealed && this.bottom>REVEAL_ZONE_TOP){
      const near=this.isNear();
      if(near){
        const rev=(BASE_REVEAL_TIME*(this.tokenCount/6));
        this.revealProgress+=dt/rev;
        if(this.revealProgress>=1) this.revealed=true;
      }else{
        this.revealProgress=Math.max(0,this.revealProgress-0.002*dt);
      }
    }
  }

  isNear(){
    const colW = COL_SIZES[this.colIndex];
    let indexes = this.patternCells();   // → {rows, cols, cells[]}
    for (const cell of indexes.cells){
      const cx = this.x + cell.col*GRID_UNIT + ROW_CENTER;
      const cy = this.y + cell.row*GRID_UNIT + ROW_CENTER;
      if(Math.hypot(mouseX - cx, mouseY - cy) < 40) return true;
    }
    return false;
  }

  // --------------------------------------------------------------
  // Returns { rows, cols, cells[] } describing token cell positions
  // All shapes are grid-aligned here
  // --------------------------------------------------------------
  patternCells(){
    switch(this.tokenCount){

      case 1: // Column 1 only
        return { rows:1, cols:1, cells:[{row:0,col:0}] };

      case 2:
        return {
          rows:1, cols:2,
          cells:[
            {row:0,col:0}, {row:0,col:1}
          ]
        };

      case 3:
        return {
          rows:1, cols:3,
          cells:[
            {row:0,col:0}, {row:0,col:1}, {row:0,col:2}
          ]
        };

      case 4: // 2x2
        return {
          rows:2, cols:2,
          cells:[
            {row:0,col:0},{row:0,col:1},
            {row:1,col:0},{row:1,col:1},
          ]
        };

      case 5: // 3 bottom, 2 top (centered)
        return {
          rows:2, cols:3,
          cells:[
            {row:1,col:0},{row:1,col:1},{row:1,col:2},
            {row:0,col:0.5},{row:0,col:1.5}, // centred over the 3 below
          ]
        };

      case 6: // 3×2
        return {
          rows:2, cols:3,
          cells:[
            {row:0,col:0},{row:0,col:1},{row:0,col:2},
            {row:1,col:0},{row:1,col:1},{row:1,col:2},
          ]
        };

      default: // fallback → vertical stack
        let c=[];
        for(let i=0;i<this.tokenCount;i++)
          c.push({row:i,col:0});
        return {rows:this.tokenCount, cols:1, cells:c};
    }
  }

  // ---------------------------------------------------------
  // Draw using grid alignment — faces!
  // ---------------------------------------------------------
  draw(){
    const isSel = selected.includes(this);
    const pattern = this.patternCells();
    const colGrid = COL_SIZES[this.colIndex];
    const offsetCols = (colGrid - pattern.cols) / 2;

    for(let ci=0; ci<pattern.cells.length; ci++){
      const cell = pattern.cells[ci];
      const cx = this.x + (offsetCols * GRID_UNIT) + (cell.col * GRID_UNIT) + ROW_CENTER;
      const cy = this.y + cell.row*GRID_UNIT + ROW_CENTER;
      const seed = this.faceSeeds[ci];
      const r = GRID_UNIT/2.5;
      drawFace(ctx, cx, cy, r, seed, isSel, this.revealed ? this.tokenCount : null);
    }
  }
}

// ======================================================================
//  FACE DRAWING
// ======================================================================
// Deterministic pseudo-random from a seed float
function seededRand(seed, n){ return (Math.sin(seed * 9301 + n * 49297 + 233) * 0.5 + 0.5); }

const SKIN_TONES=['#FDDBB4','#F5C89A','#E0A87C','#C68642','#8D5524','#FFD3A8','#F1C27D'];
const HAIR_COLORS=['#1a0a00','#3b1f0a','#7b4f1e','#b87333','#c8a96e','#e8d5b0','#ff6b6b','#4ecdc4','#a8e6cf'];
const EYE_SHAPES=['round','wide','narrow','star'];

function drawFace(ctx, cx, cy, r, seed, selected, count){
  const skin = SKIN_TONES[Math.floor(seededRand(seed,1)*SKIN_TONES.length)];
  const hair = HAIR_COLORS[Math.floor(seededRand(seed,2)*HAIR_COLORS.length)];
  const eyeShape = EYE_SHAPES[Math.floor(seededRand(seed,3)*EYE_SHAPES.length)];
  const hasGlasses = seededRand(seed,4) > 0.7;
  const mouthType = Math.floor(seededRand(seed,5)*3); // 0=smile,1=neutral,2=big smile
  const hasBeard = seededRand(seed,6) > 0.65;
  const hairStyle = Math.floor(seededRand(seed,7)*4); // 0=short,1=long,2=bald,3=spiky
  const blushColor = seededRand(seed,8) > 0.5 ? 'rgba(255,150,150,0.35)' : null;
  const eyebrowAngle = seededRand(seed,9) > 0.5 ? 0.15 : -0.05;

  ctx.save();
  ctx.translate(cx, cy);

  // Selection glow
  if(selected){
    ctx.shadowColor='rgba(255,220,0,0.9)';
    ctx.shadowBlur=12;
    ctx.beginPath();
    ctx.arc(0,0,r+3,0,Math.PI*2);
    ctx.strokeStyle='gold';
    ctx.lineWidth=3;
    ctx.stroke();
    ctx.shadowBlur=0;
  }

  // Hair (behind face) — bald skip
  if(hairStyle !== 2){
    ctx.beginPath();
    ctx.fillStyle = hair;
    if(hairStyle === 0){ // short
      ctx.ellipse(0, -r*0.35, r*0.92, r*0.72, 0, Math.PI, 0);
      ctx.fill();
    } else if(hairStyle === 1){ // long
      ctx.ellipse(0, -r*0.35, r*0.92, r*0.72, 0, Math.PI, 0);
      ctx.fill();
      // side strands
      ctx.beginPath();
      ctx.fillStyle = hair;
      ctx.ellipse(-r*0.78, r*0.2, r*0.2, r*0.6, -0.2, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(r*0.78, r*0.2, r*0.2, r*0.6, 0.2, 0, Math.PI*2);
      ctx.fill();
    } else if(hairStyle === 3){ // spiky
      for(let i=0;i<7;i++){
        const ang = Math.PI + (i/(6))*Math.PI;
        ctx.beginPath();
        ctx.moveTo(Math.cos(ang)*r*0.78, Math.sin(ang)*r*0.78);
        ctx.lineTo(Math.cos(ang-0.18)*r*0.5, Math.sin(ang-0.18)*r*0.5);
        ctx.lineTo(Math.cos(ang+0.18)*r*0.5, Math.sin(ang+0.18)*r*0.5);
        ctx.closePath();
        ctx.fillStyle = hair;
        ctx.fill();
      }
    }
  }

  // Face circle
  ctx.beginPath();
  ctx.arc(0,0,r,0,Math.PI*2);
  ctx.fillStyle = selected ? '#fff9c4' : skin;
  ctx.fill();
  ctx.strokeStyle = selected ? 'gold' : 'rgba(0,0,0,0.3)';
  ctx.lineWidth = selected ? 2 : 1;
  ctx.stroke();

  // Blush
  if(blushColor){
    ctx.beginPath();
    ctx.ellipse(-r*0.52, r*0.2, r*0.22, r*0.14, 0, 0, Math.PI*2);
    ctx.fillStyle = blushColor;
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(r*0.52, r*0.2, r*0.22, r*0.14, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // Eyebrows
  const eyY = -r*0.25;
  ctx.strokeStyle = hair === '#e8d5b0' || hair === '#c8a96e' ? '#888' : hair;
  ctx.lineWidth = r*0.1;
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-r*0.5, eyY - r*0.18 + eyebrowAngle*r);
  ctx.lineTo(-r*0.2, eyY - r*0.18 - eyebrowAngle*r);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(r*0.2, eyY - r*0.18 - eyebrowAngle*r);
  ctx.lineTo(r*0.5, eyY - r*0.18 + eyebrowAngle*r);
  ctx.stroke();

  // Eyes
  const eyeY = eyY + r*0.05;
  const eyeRx = r*0.14, eyeRy = eyeShape==='wide'?r*0.18:eyeShape==='narrow'?r*0.08:r*0.13;
  [-r*0.3, r*0.3].forEach(ex => {
    if(eyeShape==='star'){
      // Star eyes
      ctx.save();
      ctx.translate(ex, eyeY);
      ctx.beginPath();
      for(let p=0;p<5;p++){
        const a = (p*4*Math.PI/5) - Math.PI/2;
        const a2 = a + 2*Math.PI/10;
        p===0 ? ctx.moveTo(Math.cos(a)*eyeRx, Math.sin(a)*eyeRx) : ctx.lineTo(Math.cos(a)*eyeRx, Math.sin(a)*eyeRx);
        ctx.lineTo(Math.cos(a2)*eyeRx*0.45, Math.sin(a2)*eyeRx*0.45);
      }
      ctx.closePath();
      ctx.fillStyle='#222';
      ctx.fill();
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.ellipse(ex, eyeY, eyeRx, eyeRy, 0, 0, Math.PI*2);
      ctx.fillStyle='#fff';
      ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=0.5; ctx.stroke();
      // pupil
      ctx.beginPath();
      ctx.arc(ex + r*0.03, eyeY + r*0.02, eyeRy*0.55, 0, Math.PI*2);
      ctx.fillStyle='#1a1a1a';
      ctx.fill();
      // shine
      ctx.beginPath();
      ctx.arc(ex + r*0.06, eyeY - r*0.02, eyeRy*0.2, 0, Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.8)';
      ctx.fill();
    }
  });

  // Glasses
  if(hasGlasses){
    ctx.strokeStyle = seededRand(seed,10)>0.5 ? '#1a1a1a' : '#8B4513';
    ctx.lineWidth = r*0.07;
    ctx.beginPath();
    ctx.arc(-r*0.3, eyeY, r*0.22, 0, Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(r*0.3, eyeY, r*0.22, 0, Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-r*0.08, eyeY);
    ctx.lineTo(r*0.08, eyeY);
    ctx.stroke();
    // temples
    ctx.beginPath();
    ctx.moveTo(-r*0.52, eyeY);
    ctx.lineTo(-r*0.85, eyeY+r*0.05);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(r*0.52, eyeY);
    ctx.lineTo(r*0.85, eyeY+r*0.05);
    ctx.stroke();
  }

  // Nose
  ctx.strokeStyle='rgba(0,0,0,0.25)';
  ctx.lineWidth=r*0.07;
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-r*0.08, r*0.05);
  ctx.quadraticCurveTo(r*0.14, r*0.1, r*0.08, r*0.2);
  ctx.stroke();

  // Mouth
  ctx.strokeStyle = selected ? '#333' : 'rgba(0,0,0,0.55)';
  ctx.lineWidth = r*0.1;
  ctx.lineCap='round';
  if(mouthType===0){ // smile
    ctx.beginPath();
    ctx.arc(0, r*0.28, r*0.3, 0.2, Math.PI-0.2);
    ctx.stroke();
  } else if(mouthType===1){ // neutral
    ctx.beginPath();
    ctx.moveTo(-r*0.28, r*0.42);
    ctx.lineTo(r*0.28, r*0.42);
    ctx.stroke();
  } else { // big smile with teeth
    ctx.beginPath();
    ctx.arc(0, r*0.22, r*0.34, 0.1, Math.PI-0.1);
    ctx.stroke();
    // teeth
    ctx.beginPath();
    ctx.arc(0, r*0.22, r*0.33, 0.12, Math.PI-0.12);
    ctx.fillStyle='white';
    ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.12)';
    ctx.lineWidth=0.5;
    ctx.beginPath();
    ctx.moveTo(0, r*0.22 - r*0.33*0.7);
    ctx.lineTo(0, r*0.55);
    ctx.stroke();
  }

  // Beard
  if(hasBeard){
    ctx.beginPath();
    ctx.ellipse(0, r*0.58, r*0.38, r*0.28, 0, 0, Math.PI*2);
    ctx.fillStyle = hair;
    ctx.globalAlpha=0.7;
    ctx.fill();
    ctx.globalAlpha=1;
  }

  // Count label (revealed)
  if(count !== null){
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.beginPath();
    ctx.arc(r*0.62, -r*0.62, r*0.42, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.round(r*0.64)}px Arial`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(count, r*0.62, -r*0.62);
  }

  ctx.restore();
}

// ======================================================================
//  GAME HELPERS
// ======================================================================
function randomTokenCount(col){
  if(col===0) return 1;  // Column 1 only single tokens
  return Math.floor(Math.random()*5)+2; // 2–6
}

function drawGrid(){
  ctx.strokeStyle='#444';
  for(let i=0;i<COL_X.length;i++)
    ctx.strokeRect(COL_X[i],0,COL_SIZES[i]*GRID_UNIT,HEIGHT);

  ctx.fillStyle='rgba(255,255,255,0.05)';
  ctx.fillRect(0,BOTTOM_SELECT_ZONE,WIDTH,HEIGHT-BOTTOM_SELECT_ZONE);
}

function collapseColumn(c){
  const col=groups.filter(g=>g.colIndex===c).sort((a,b)=>a.y-b.y);
  let off=0;
  for(let i=col.length-1;i>=0;i--){
    const g=col[i];
    g.desiredY=HEIGHT-(off+g.rows)*GRID_UNIT;
    g.landed=true;
    off+=g.rows;
  }
  columnHeights[c]=off;
}

function getClickedGroup(x,y){
  return groups.findLast(g=>(
    x>=g.x &&
    x<=g.x + COL_SIZES[g.colIndex]*GRID_UNIT &&
    y>=g.y &&
    y<=g.bottom
  ));
}

// ======================================================================
//  SELECTION — ONLY bottom 3 rows
// ======================================================================
function selectHandler(x, y) {
  if (gameOver) return;
  // only bottom 3 rows are selectable
  if (y < BOTTOM_SELECT_ZONE) return;
  const g = getClickedGroup(x, y);
  if (!g) return;
  // cannot select until revealed
  if (!g.revealed) return;
  // cannot select if ANY group below it in same column is unselected
  const blocked = groups.some(h =>
    h.colIndex === g.colIndex &&
    h.bottom > g.bottom &&        // below g
    !selected.includes(h)         // and not selected
  );
  if (blocked) return;
  // toggle selection
  const already = selected.includes(g);
  if (already) selected = selected.filter(s => s !== g);
  else selected.push(g);
  // update GO button
  const total = selected.reduce((s, grp) => s + grp.tokenCount, 0);
  goBtn.disabled = (total !== 6);
}

canvas.addEventListener('click',e=>{processPointer(e);selectHandler(mouseX,mouseY);});
canvas.addEventListener('touchend',e=>{processPointer(e);selectHandler(mouseX,mouseY);});

// ======================================================================
//  GO & RESTART
// ======================================================================
goBtn.addEventListener('click',()=>{
  if(selected.length===0||gameOver) return;

  for(const g of selected){
    rowsRemoved[g.colIndex]+=g.rows;
    tokensRemovedTotal += g.tokenCount;
  }

  const affected=[...new Set(selected.map(g=>g.colIndex))];
  groups=groups.filter(g=>!selected.includes(g));
  selected=[];
  affected.forEach(collapseColumn);
  goBtn.disabled=true;
});

function resetVars(){
  groups=[];
  selected=[];
  columnHeights=[0,0,0,0];
  rowsRemoved=[0,0,0,0];
  tokensRemovedTotal=0;
  startTime=performance.now();
  gameOver=false;
  tokensPerSecond=0.5;
  fallInterval=1000/tokensPerSecond;
  last=0;
  goBtn.disabled=true;
  timeUpElem.style.display='none';
  restartBtn.style.display='none';
}

restartBtn.addEventListener('click',()=>{
  resetVars();
  fillColumnsToTop();
  requestAnimationFrame(gameLoop);
});

// ======================================================================
//  PROGRESSIVE SPEED
// ======================================================================
setInterval(()=>{
  tokensPerSecond=Math.min(1, tokensPerSecond+0.1);
  fallInterval=1000/tokensPerSecond;
},60000);

// ======================================================================
//  STATS, GUESTS/HR, SCORE, TIMER
// ======================================================================
function updateStats(vals){
  const now=performance.now();
  const elapsed=(now-startTime)/1000;
  const remain=Math.max(0,180-elapsed);

  const mins=Math.floor(remain/60);
  const secs=Math.floor(remain%60);
  timerElem.textContent=`${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;

  if(now-startTime>=GAME_LIMIT && !gameOver){
    gameOver=true;
    goBtn.disabled=true;
    timeUpElem.style.display='block';
    restartBtn.style.display='block';
  }

  const gph = elapsed>0 ? Math.round((tokensRemovedTotal/elapsed)*3600) : 0;
  gphElem.textContent=gph;
  if(gph>2400) gphElem.style.color='var(--green)';
  else if(gph>=2000) gphElem.style.color='var(--amber)';
  else gphElem.style.color='var(--red)';

  const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
  const variance = vals.reduce((a,b)=>a + Math.pow(b-avg,2),0)/vals.length;
  const stdev=Math.sqrt(variance);
  score = stdev>0 ? (avg/stdev) : 0;

  scoreElem.textContent = `${Math.round(score)} out of 25`;
}

// ======================================================================
//  GAME LOOP
// ======================================================================
let last=0;
function gameLoop(t){
  const dt=t-last; last=t;

  ctx.clearRect(0,0,WIDTH,HEIGHT);
  drawGrid();

  groups.forEach(g=>g.update(dt));
  groups.forEach(g=>g.draw());

  const elapsed=(performance.now()-startTime)/1000;
  const vals=[0,0,0,0];
  for(let i=0;i<4;i++)
    vals[i] = rowsRemoved[i]>0 ? (elapsed/rowsRemoved[i]) : 0;

  // draw counters at top of each column
  ctx.font='bold 14px Arial';
  ctx.fillStyle='#fff';
  ctx.textAlign='center';
  for(let c=0;c<4;c++){
    const cx=COL_X[c] + (COL_SIZES[c]*GRID_UNIT)/2;
    ctx.fillText(`${Math.round(vals[c])} s`, cx, 20);
  }

  updateStats(vals);

  if(!gameOver) requestAnimationFrame(gameLoop);
}

// ======================================================================
//  INITIAL FILL & SPAWN
// ======================================================================
function fillColumnsToTop(){
  groups=[]; columnHeights.fill(0);

  const rowsPerCol=Math.floor(HEIGHT/GRID_UNIT);

  for(let c=0;c<4;c++){
    let filled=0;
    while(filled<rowsPerCol){
      const n=randomTokenCount(c);
      const g=new Group(c,n);
      g.landed=true;
      g.desiredY=g.y = HEIGHT-(filled+g.rows)*GRID_UNIT;
      groups.push(g);
      filled+=g.rows;
    }
    columnHeights[c]=filled;
  }
}

function spawnGroups(){
  if(gameOver) return;
  for(let c=0;c<4;c++)
    groups.push(new Group(c, randomTokenCount(c)));
}

fillColumnsToTop();
setInterval(spawnGroups,2500);
requestAnimationFrame(gameLoop);

</script>
